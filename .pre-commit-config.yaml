repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1 # Vérifie si une version plus récente existe si besoin
    hooks:
      - id: terraform_fmt

  - repo: local
    hooks:
      - id: terraform_tflint
        name: Terraform TFLint
        entry: bash -c 'cd terraform && "C:/Users/Tomy-3.1 laptop/AppData/Local/Microsoft/WinGet/Packages/TerraformLinters.tflint_Microsoft.Winget.Source_8wekyb3d8bbwe/tflint.exe" --init && "C:/Users/Tomy-3.1 laptop/AppData/Local/Microsoft/WinGet/Packages/TerraformLinters.tflint_Microsoft.Winget.Source_8wekyb3d8bbwe/tflint.exe"'
        language: system
        pass_filenames: false
        files: \.(tf|tfvars)$