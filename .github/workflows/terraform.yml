name: Terraform plan on PR

on:
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  RGROUP: ${{ vars.TF_RGROUP }}
  SA_BACKEND: ${{ vars.TF_SA_BACKEND }}
  OWNER: ${{ vars.TF_OWNER }}
  TF_VAR_owner: ${{ vars.TF_OWNER }}
  TF_VAR_resource_group_name: ${{ vars.TF_RGROUP }}

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Az CLI login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: tf-apply
    defaults:
        run:
            working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Az CLI login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state

      - name: Terraform Apply
        run: terraform apply -auto-approve

  destroy:
    needs: apply
    runs-on: ubuntu-latest
    environment: tf-destroy
    defaults:
        run:
            working-directory: ./terraform
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Az CLI login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state


      - name: Terraform Destroy
        run: terraform destroy -auto-approve
