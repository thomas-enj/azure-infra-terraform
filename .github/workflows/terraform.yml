name: Terraform - Test, Plan, Apply & Destroy

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TERRAFORM_VERSION: 1.9.0
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  RGROUP: ${{ vars.TF_RGROUP }}
  SA_BACKEND: ${{ vars.TF_SA_BACKEND }}
  OWNER: ${{ vars.TF_OWNER }}
  TF_VAR_owner: ${{ vars.TF_OWNER }}
  TF_VAR_resource_group_name: ${{ vars.TF_RGROUP }}

jobs:
  tflint:
    name: Terraform Linting
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.52.0

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint -f compact

  checkov:
    name: Security Scan (Checkov)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./terraform
          framework: terraform
          # Output to console for detailed log review and generate a SARIF file to capture severity levels
          output_format: cli,sarif
          # Map outputs respectively: 'cli' to stdout, 'sarif' to the specified file
          output_file_path: console,checkov_report.sarif
          # Ensure pipeline continues executing to allow reporting even if policy violations occur
          soft_fail: true

      - name: Publish Checkov Summary with Severities
        if: always()
        run: |
          echo "### 🛡️ Checkov Security Scan Report" >> $GITHUB_STEP_SUMMARY
          
          if [ -f ./checkov_report.sarif ]; then
            # Execute Python script to count metrics, sort results, and conditionally raise exit codes
            python3 -c '
          import json
          import urllib.request
          import sys
          
          def fetch_severity_from_url(url):
              if not url:
                  return "UNKNOWN"
              try:
                  # Query the Prisma Cloud policy guideline page with a standard User-Agent header
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=5) as response:
                      html = response.read().decode("utf-8").lower()
                      
                      # Look for common patterns highlighting severity levels in documentation HTML
                      if "critical" in html: return "CRITICAL"
                      elif "high" in html: return "HIGH"
                      elif "medium" in html: return "MEDIUM"
                      elif "low" in html: return "LOW"
              except Exception:
                  pass
              return "UNKNOWN"
          
          with open("./checkov_report.sarif", "r") as f:
              data = json.load(f)
          
          rule_meta = {}
          for run in data.get("runs", []):
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  help_url = rule.get("helpUri", "")
                  severity = fetch_severity_from_url(help_url)
                  
                  rule_meta[rule["id"]] = {
                      "severity": severity,
                      "help_url": help_url
                  }
          
          # Initialize severity weights and counter dictionary
          severity_weights = {"CRITICAL": 4, "HIGH": 3, "MEDIUM": 2, "LOW": 1, "UNKNOWN": 0}
          counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "UNKNOWN": 0}
          report_rows = []
          total_findings = 0
          
          for run in data.get("runs", []):
              for result in run.get("results", []):
                  rule_id = result.get("ruleId")
                  meta = rule_meta.get(rule_id, {"severity": "UNKNOWN", "help_url": ""})
                  severity = meta["severity"]
                  help_url = meta["help_url"]
                  
                  # Increment counters
                  counts[severity] = counts.get(severity, 0) + 1
                  total_findings += 1
                  
                  file_path = result["locations"][0]["physicalLocation"]["artifactLocation"]["uri"]
                  base_desc = result["message"]["text"].replace("\n", " ")
                  
                  if help_url:
                      description = f"{base_desc} ([Guideline]({help_url}))"
                  else:
                      description = base_desc
                  
                  report_rows.append({
                      "weight": severity_weights.get(severity, 0),
                      "markdown": f"| **{severity}** | `{rule_id}` | {file_path} | {description} |"
                  })
          
          # Extract values into standard variables to avoid inner quote escaping issues entirely
          c_crit = counts.get("CRITICAL", 0)
          c_high = counts.get("HIGH", 0)
          c_med  = counts.get("MEDIUM", 0)
          c_low  = counts.get("LOW", 0)
          c_unk  = counts.get("UNKNOWN", 0)
          
          summary_text = f"**CRITICAL** = {c_crit}, **HIGH** = {c_high}, **MEDIUM** = {c_med}, **LOW** = {c_low}, **UNKNOWN** = {c_unk} | **Total** = {total_findings}"
          print(summary_text)
          print("\n---")
          
          # Print Markdown table headers
          print("| Severity | Check ID | File | Description |")
          print("|--- |--- |--- |--- |")
          
          # Sort rows seamlessly in descending order based on precedence weight
          report_rows.sort(key=lambda x: x["weight"], reverse=True)
          
          for row in report_rows:
              print(row["markdown"])
          
          # Enforce security gates: hard fail the step if CRITICAL or HIGH threats are detected
          if c_crit > 0 or c_high > 0:
              print(f"\n❌ Pipeline blocked: Found {c_crit} CRITICAL and {c_high} HIGH security violations.", file=sys.stderr)
              sys.exit(1)
            ' >> $GITHUB_STEP_SUMMARY
          else
            echo "No policy violations or artifact files detected." >> $GITHUB_STEP_SUMMARY
          fi

  tftest:
    name: Terraform Test
    needs: [tflint, checkov]
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Az CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state

      - name: Terraform Test
        run: terraform test
  
  plan:
    name: Terraform Plan
    needs: tftest
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Az CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          # The plan is launched with the colors (for CI logs) and saved
          terraform plan -out=tfplan
          
          # The result is displayed in black text for the comment
          PLAN_TEXT=$(terraform show -no-color tfplan)
          
          # Required syntax to safely pass a multi-line string to GITHUB_OUTPUT
          delimiter="$(openssl rand -hex 8)"
          echo "clean_plan<<${delimiter}" >> $GITHUB_OUTPUT
          echo "$PLAN_TEXT" >> $GITHUB_OUTPUT
          echo "${delimiter}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment PR with Terraform Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Structure of the body of the commentary
            const output = `### Terraform result 🚀
            #### Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
            #### Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Plan 📖 \`${{ steps.plan.outcome }}\`
            
            <details><summary>Display Plan Details</summary>
            
            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`
            
            </details>
            
            *Triggered by : @${{ github.actor }}, Event : \`${{ github.event_name }}\`*`;
            
            // Publication of the commentary
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: tf-apply
    defaults:
        run:
            working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Az CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state

      - name: Terraform Apply
        run: terraform apply -auto-approve

  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: tf-destroy
    defaults:
        run:
            working-directory: ./terraform
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Az CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${RGROUP}" \
            -backend-config="storage_account_name=${SA_BACKEND}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${OWNER}.terraform.tfstate" \
            -migrate-state


      - name: Terraform Destroy
        run: terraform destroy -auto-approve
